services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FLASK_ENV: development
    volumes:
      - ./backend/static/images:/app/static/images
    network_mode: host

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '5173:5173'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      - backend
