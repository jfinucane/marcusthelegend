version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: storyforge_db
      POSTGRES_USER: storyforge_user
      POSTGRES_PASSWORD: bueller
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U storyforge_user -d storyforge_db']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://storyforge_user:bueller@postgres:5432/storyforge_db
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      FLASK_ENV: development
    volumes:
      - ./backend/static/images:/app/static/images
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  pg_data:
